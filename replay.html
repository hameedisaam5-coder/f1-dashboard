<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>F1 Race Replay V2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif;
      overflow: hidden; user-select: none;
    }
    
    /* Fullscreen Canvas */
    #replayCanvas {
      display: block; width: 100vw; height: 100vh; cursor: grab;
    }
    #replayCanvas:active { cursor: grabbing; }

    /* Floating Glass Panels */
    .glass-panel {
      position: absolute;
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 10;
    }

    /* Top Bar - Controls & Load */
    #topBar {
      top: 20px; left: 20px;
      display: flex; gap: 12px; align-items: center;
    }
    select, button {
      background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 12px; border-radius: 4px; font-size: 14px; outline: none; cursor: pointer;
    }
    select option { background: #111; }
    button:hover { background: rgba(255,255,255,0.2); }
    .btn-red { background: #e10600; border-color: #ff1a1a; font-weight: bold; }
    .btn-red:hover { background: #ff1a1a; }

    /* Weather Panel */
    #weatherPanel {
      top: 20px; right: 350px; width: 200px;
    }
    .weather-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; color: #ccc; }
    .weather-row span:last-child { color: #fff; font-weight: 600; }

    /* Leaderboard Panel */
    #leaderboardPanel {
      top: 20px; right: 20px; width: 300px; height: calc(100vh - 40px);
      display: flex; flex-direction: column; padding: 12px;
    }
    .lb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .lb-title { font-size: 18px; font-weight: 700; }
    
    .lb-toggles { display: flex; gap: 8px; }
    .lb-toggle { 
      width: 24px; height: 24px; border-radius: 50%; font-size: 11px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      background: #333; border: 2px solid #555; cursor: pointer;
    }
    .lb-toggle.active { background: #22c55e; border-color: #4ade80; color: #000; }

    .lb-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column; padding-right: 4px; gap: 4px;
    }
    .lb-content::-webkit-scrollbar { width: 4px; }
    .lb-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .lb-row {
      display: flex; align-items: center; font-size: 13px; padding: 4px 6px;
      border-radius: 4px; border: 1px solid transparent; cursor: pointer; transition: all 0.1s;
    }
    .lb-row:hover { background: rgba(255,255,255,0.05); }
    .lb-row.selected { background: rgba(255,255,255,0.15); border-color: #888; }
    
    .lb-pos { width: 24px; font-weight: 600; text-align: right; margin-right: 8px; color: #aaa; }
    .lb-code { width: 40px; font-weight: bold; }
    .lb-gap { flex: 1; text-align: right; color: #bbb; margin-right: 12px; font-variant-numeric: tabular-nums; }
    
    .lb-drs { width: 8px; height: 8px; border-radius: 50%; background: #444; margin-right: 8px; }
    .lb-drs.active { background: #22c55e; box-shadow: 0 0 6px #22c55e; }

    .lb-tyre-wrapper { position: relative; width: 24px; height: 24px; margin-right: 6px; }
    .lb-tyre { 
      width: 100%; height: 100%; border-radius: 50%; border: 2px solid; 
      display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold;
      color: #fff; background: rgba(0,0,0,0.5); position: absolute; top:0; left:0;
    }
    .lb-tyre-bg { opacity: 0.3; } /* the greyed out background tyre */
    .lb-tyre-fg { clip-path: inset(0 0 0 0); transition: clip-path 0.2s; } /* the bright foreground tyre */
    
    .tyre-S { border-color: #ff2800; }
    .tyre-M { border-color: #f6d15a; }
    .tyre-H { border-color: #ffffff; }
    .tyre-I { border-color: #00a651; }
    .tyre-W { border-color: #0072ce; }
    
    .lb-age { font-size: 10px; font-weight: bold; width: 14px; text-align: center;}

    /* Controls Legend */
    #legendPanel {
      bottom: 20px; left: 20px; width: 220px;
    }
    .legend-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #aaa; }
    .legend-row strong { color: #fff; }

    /* Bottom Playback Scrubber */
    #playbackPanel {
      bottom: 20px; left: 260px; right: 350px;
      display: flex; gap: 16px; align-items: center; padding: 12px 20px;
    }
    .time-disp { font-variant-numeric: tabular-nums; font-size: 14px; font-weight: 600; width: 55px; }

    /* Range slider custom styling */
    input[type=range] {
      -webkit-appearance: none; flex: 1; background: transparent; cursor: pointer;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px;
    }
    input[type=range]::-webkit-slider-thumb {
      height: 16px; width: 16px; border-radius: 50%; background: #e10600;
      -webkit-appearance: none; margin-top: -5px; box-shadow: 0 0 8px #e10600;
      transition: transform 0.1s;
    }
    input[type=range]:active::-webkit-slider-thumb { transform: scale(1.2); }

    /* Loading Overlay */
    #loader {
      position: absolute; inset: 0; background: #000; z-index: 50;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .spinner {
      width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1); 
      border-top-color: #e10600; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Insights Modal */
    #insightsModal {
      position: absolute; inset: 10%; background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      z-index: 100; display: none; flex-direction: column; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h2 { margin: 0; font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 12px;}
    .close-btn { background: #333; border: none; font-size: 24px; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s;}
    .close-btn:hover { background: #e10600; }
    
    .chart-container { flex: 1; position: relative; width: 100%; min-height: 0; }
  </style>
</head>
<body>

  <!-- Fullscreen Canvas -->
  <canvas id="replayCanvas"></canvas>

  <!-- Top Bar -->
  <div id="topBar" class="glass-panel">
    <a href="/" class="text-xs text-gray-400 hover:text-white mr-4 flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Dashboard
    </a>
    <select id="selYear">
      <option value="2025" selected>2025</option>
      <option value="2024">2024</option>
      <option value="2026">2026</option>
    </select>
    <select id="selRace">
      <option value="Australian Grand Prix" selected>Australian Grand Prix</option>
      <option value="Bahrain Grand Prix">Bahrain Grand Prix</option>
      <option value="Saudi Arabian Grand Prix">Saudi Arabian Grand Prix</option>
      <option value="Japanese Grand Prix">Japanese Grand Prix</option>
      <option value="Chinese Grand Prix">Chinese Grand Prix</option>
      <option value="Miami Grand Prix">Miami Grand Prix</option>
      <option value="Emilia Romagna Grand Prix">Emilia Romagna Grand Prix</option>
      <option value="Monaco Grand Prix">Monaco Grand Prix</option>
      <option value="Canadian Grand Prix">Canadian Grand Prix</option>
      <option value="Spanish Grand Prix">Spanish Grand Prix</option>
      <option value="Austrian Grand Prix">Austrian Grand Prix</option>
      <option value="British Grand Prix">British Grand Prix</option>
    </select>
    <select id="selSession">
      <option value="R" selected>Race (R)</option>
      <option value="S">Sprint (S)</option>
      <option value="Q">Qualifying (Q)</option>
    </select>
    <button id="btnLoad" class="btn-red" onclick="loadReplay()">LOAD REPLAY</button>
  </div>

  <!-- Weather Panel -->
  <div id="weatherPanel" class="glass-panel" style="display: none;">
    <div class="lb-title mb-3">Weather</div>
    <div class="weather-row"><span>Air Temp</span><span id="wAir">-- °C</span></div>
    <div class="weather-row"><span>Track Temp</span><span id="wTrk">-- °C</span></div>
    <div class="weather-row"><span>Humidity</span><span id="wHum">-- %</span></div>
    <div class="weather-row"><span>Wind</span><span id="wWnd">-- km/h</span></div>
    <div class="weather-row"><span>Rain</span><span id="wRin">--</span></div>
  </div>

  <!-- Leaderboard -->
  <div id="leaderboardPanel" class="glass-panel" style="display: none;">
    <div class="lb-header">
      <div class="lb-title">Leaderboard</div>
      <div class="lb-toggles">
        <div id="togI" class="lb-toggle active" title="Interval" onclick="setGapMode('I')">I</div>
        <div id="togL" class="lb-toggle" title="Leader" onclick="setGapMode('L')">L</div>
      </div>
    </div>
    <div id="lbContent" class="lb-content"></div>
    <div class="mt-2 text-xs text-center text-gray-500">Lap <span id="lbLapCount">1</span></div>
  </div>

  <!-- Legend -->
  <div id="legendPanel" class="glass-panel">
    <div class="lb-title mb-2" style="font-size: 14px;">Controls</div>
    <div class="legend-row"><span>Play / Pause</span><strong>Space</strong></div>
    <div class="legend-row"><span>Scrub Timeline</span><strong>← / →</strong></div>
    <div class="legend-row"><span>Speed Modes</span><strong>1, 2, 3, 4</strong></div>
    <div class="legend-row"><span>Pan Camera</span><strong>Drag</strong></div>
    <div class="legend-row"><span>Zoom</span><strong>Scroll</strong></div>
    <div class="legend-row"><span>View Telemetry</span><strong>Click Driver</strong></div>
    <button onclick="document.getElementById('insightsModal').style.display='flex'" class="w-full mt-3 bg-gray-800 hover:bg-gray-700 text-xs py-1 rounded">Open Insights</button>
  </div>

  <!-- Playback Scrubber -->
  <div id="playbackPanel" class="glass-panel" style="display: none;">
    <button id="btnPlay" onclick="togglePlay()" class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-700 hover:bg-gray-600">▶</button>
    <div id="timeCur" class="time-disp text-right">0:00</div>
    <input type="range" id="scrubber" min="0" max="1000" value="0">
    <div id="timeMax" class="time-disp">0:00</div>
    <button id="btnSpeed" onclick="cycleSpeed()" class="bg-gray-800 text-xs font-bold rounded px-2 py-1 w-12 text-center">1x</button>
  </div>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <div id="loaderText" class="text-xl font-bold tracking-wide">Downloading Telemetry...</div>
  </div>

  <!-- Insights Modal -->
  <div id="insightsModal">
    <div class="modal-header">
      <h2><span id="insIndicator" style="display:inline-block;width:16px;height:16px;border-radius:50%;background:#e10600;"></span> Insights: <span id="insDriver">Select a Driver</span></h2>
      <button class="close-btn" onclick="document.getElementById('insightsModal').style.display='none'">×</button>
    </div>
    <div class="chart-container">
      <canvas id="insightChart"></canvas>
    </div>
  </div>

  <script>
    // Constants & Globals
    const teamColors = {
      "VER": "#3671C6", "PER": "#3671C6",
      "LEC": "#E8002D", "SAI": "#E8002D", "HAM": "#E8002D",
      "NOR": "#FF8000", "PIA": "#FF8000",
      "RUS": "#27F4D2", "ANT": "#27F4D2",
      "ALO": "#229971", "STR": "#229971",
      "GAS": "#0093cc", "OCO": "#0093cc", "DOO": "#0093cc",
      "ALB": "#64C4FF", "COL": "#64C4FF", "SAI": "#64C4FF",
      "TSU": "#6692FF", "RIC": "#6692FF", "LAW": "#6692FF", "HAD": "#6692FF",
      "BOT": "#52E252", "ZHO": "#52E252", "BOR": "#52E252",
      "MAG": "#B6BABD", "HUL": "#B6BABD", "BEA": "#B6BABD", "OAC": "#B6BABD"
    }

    let replayData = null
    let currentRealTime = 0
    let playing = false
    let lastTickTime = 0
    let speeds = [0.5, 1, 2, 4]
    let speedIdx = 1
    let reqAnimFrame = null

    // View state
    let camera = { x: 0, y: 0, scale: 1 }
    let isDragging = false
    let dragStart = { x: 0, y: 0 }

    // Logic state
    let gapMode = 'I' // 'I' nterval or 'L' eader
    let selectedDrivers = []
    let chartInstance = null
    
    // UI Elements
    const canvas = document.getElementById("replayCanvas")
    const ctx = canvas.getContext("2d")
    const scrubber = document.getElementById("scrubber")
    let isScrubbing = false

    // Initialize Canvas
    function resize() {
      canvas.width = window.innerWidth
      canvas.height = window.innerHeight
      if (replayData && !playing) drawFrame()
    }
    window.addEventListener('resize', resize)
    resize()

    // Setup Chart.js
    Chart.defaults.color = "#9ca3af"
    const cx = document.getElementById("insightChart").getContext("2d")
    chartInstance = new Chart(cx, {
      type: 'line',
      data: { labels: [], datasets: [] },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        elements: { point: { radius: 0 }, line: { borderWidth: 2, tension: 0.1 } },
        scales: {
          x: { display: false },
          y: { min: 0, max: 350, title: { display: true, text: 'Speed (km/h)' } },
          y1: { position: 'right', min: 0, max: 100, title: { display: true, text: 'Throttle/Brake %' } }
        },
        plugins: { legend: { position: 'top' } }
      }
    })

    // Keyboard controls
    window.addEventListener('keydown', e => {
      // Don't trigger if user is typing in an input (not that we have any, but good practice)
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return
      
      switch(e.key) {
        case ' ':
          e.preventDefault()
          togglePlay()
          break
        case 'ArrowRight':
          if (replayData) { currentRealTime = Math.min(replayData.t_max, currentRealTime + 5); drawFrame() }
          break
        case 'ArrowLeft':
          if (replayData) { currentRealTime = Math.max(0, currentRealTime - 5); drawFrame() }
          break
        case '1': speedIdx = 0; applySpeed(); break
        case '2': speedIdx = 1; applySpeed(); break
        case '3': speedIdx = 2; applySpeed(); break
        case '4': speedIdx = 3; applySpeed(); break
      }
    })

    // Mouse / Touch Controls (Panning & Zoom)
    canvas.addEventListener('mousedown', e => { isDragging = true; dragStart = { x: e.clientX - camera.x, y: e.clientY - camera.y } })
    window.addEventListener('mouseup', () => isDragging = false)
    window.addEventListener('mousemove', e => { if (isDragging) { camera.x = e.clientX - dragStart.x; camera.y = e.clientY - dragStart.y; if(!playing) drawFrame() } })
    canvas.addEventListener('wheel', e => {
      e.preventDefault()
      const zoom = e.deltaY < 0 ? 1.1 : 0.9
      const mouseX = e.clientX, mouseY = e.clientY
      camera.x = mouseX - (mouseX - camera.x) * zoom
      camera.y = mouseY - (mouseY - camera.y) * zoom
      camera.scale *= zoom
      if (!playing) drawFrame()
    }, {passive: false})

    // Scrubber
    scrubber.addEventListener("mousedown", () => isScrubbing = true)
    scrubber.addEventListener("touchstart", () => isScrubbing = true)
    window.addEventListener("mouseup", () => { if(isScrubbing) { isScrubbing=false; lastTickTime=performance.now()} })
    window.addEventListener("touchend", () => { if(isScrubbing) { isScrubbing=false; lastTickTime=performance.now()} })
    scrubber.addEventListener("input", e => {
      if(!replayData) return
      currentRealTime = (e.target.value / 1000) * replayData.t_max
      drawFrame()
    })

    // Actions
    function togglePlay() {
      playing = !playing
      document.getElementById("btnPlay").textContent = playing ? "⏸" : "▶"
      if (playing) {
        lastTickTime = performance.now()
        reqAnimFrame = requestAnimationFrame(tick)
      } else {
        cancelAnimationFrame(reqAnimFrame)
      }
    }

    function cycleSpeed() {
      speedIdx = (speedIdx + 1) % speeds.length
      applySpeed()
    }
    
    function applySpeed() {
      let spd = speeds[speedIdx]
      document.getElementById("btnSpeed").textContent = spd + "x"
    }

    function formatTime(secs) {
      if (isNaN(secs)) return "0:00"
      const m = Math.floor(secs / 60)
      const s = Math.floor(secs % 60).toString().padStart(2, '0')
      return `${m}:${s}`
    }

    function setGapMode(mode) {
      gapMode = mode
      document.getElementById('togI').className = `lb-toggle ${mode==='I'?'active':''}`
      document.getElementById('togL').className = `lb-toggle ${mode==='L'?'active':''}`
      if(!playing) drawFrame()
    }

    function toggleDriver(code) {
      if (selectedDrivers.includes(code)) {
        selectedDrivers = selectedDrivers.filter(c => c !== code)
      } else {
        selectedDrivers = [code] // single select for now
      }
      
      // Update Modal Header
      if (selectedDrivers.length > 0) {
        document.getElementById("insDriver").textContent = code
        document.getElementById("insIndicator").style.background = teamColors[code] || '#fff'
      } else {
        document.getElementById("insDriver").textContent = "Select a Driver"
        document.getElementById("insIndicator").style.background = '#e10600'
      }
      
      if(!playing) drawFrame()
    }

    // MAIN LOAD FUNCTION
    async function loadReplay() {
      const year = document.getElementById("selYear").value
      const race = document.getElementById("selRace").value
      const sess = document.getElementById("selSession").value

      document.getElementById("loader").style.display = "flex"
      document.getElementById("weatherPanel").style.display = "none"
      document.getElementById("leaderboardPanel").style.display = "none"
      document.getElementById("playbackPanel").style.display = "none"
      playing = false
      if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame)

      try {
        const res = await fetch(`/api/replay_data?year=${year}&race=${encodeURIComponent(race)}&session=${sess}&v=${Date.now()}`)
        const data = await res.json()
        if (data.error) throw new Error(data.error)
        
        replayData = data
        currentRealTime = 0
        speedIdx = 1; applySpeed()
        
        // Auto center track
        let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity
        if(data.track_x && data.track_x.length > 0) {
          data.track_x.forEach((x,i)=>{
            let y = data.track_y[i]
            if(x<minX) minX=x; if(x>maxX) maxX=x;
            if(y<minY) minY=y; if(y>maxY) maxY=y;
          })
          const pad = 100
          const tw = (maxX - minX) + pad*2
          const th = (maxY - minY) + pad*2
          const scale = Math.min(window.innerWidth/tw, window.innerHeight/th) * 0.9
          camera = {
            scale: scale,
            x: window.innerWidth/2 - ((minX+maxX)/2)*scale,
            y: window.innerHeight/2 + ((minY+maxY)/2)*scale
          }
        }

        // Create persistent DOM rows for the Leaderboard
        let lbHtml = ""
        // Get all unique driver codes from the first few frames
        let cSet = new Set()
        for(let i=0; i<Math.min(10, data.frames.length); i++){
          data.frames[i].drivers.forEach(d => cSet.add(d.code))
        }
        Array.from(cSet).forEach(code => {
          let col = teamColors[code] || '#888'
          lbHtml += `
            <div id="lb-row-${code}" class="lb-row" onclick="toggleDriver('${code}')">
              <div id="lb-pos-${code}" class="lb-pos">-</div>
              <div class="lb-code" style="color:${col}">${code}</div>
              <div id="lb-gap-${code}" class="lb-gap"></div>
              <div id="lb-drs-${code}" class="lb-drs"></div>
              <div class="lb-tyre-wrapper">
                <div class="lb-tyre lb-tyre-bg" id="lb-tyre-bg-${code}"></div>
                <div class="lb-tyre lb-tyre-fg" id="lb-tyre-fg-${code}"></div>
              </div>
              <div id="lb-age-${code}" class="lb-age">0</div>
            </div>`
        })
        document.getElementById("lbContent").innerHTML = lbHtml

        document.getElementById("loader").style.display = "none"
        document.getElementById("playbackPanel").style.display = "flex"
        document.getElementById("leaderboardPanel").style.display = "flex"
        document.getElementById("weatherPanel").style.display = "block"
        
        togglePlay() // start playing
      } catch (e) {
        document.getElementById("loaderText").textContent = "Error: " + e.message
        setTimeout(() => document.getElementById("loader").style.display="none", 3000)
      }
    }

    // MAIN INTERPOLATION FUNCTION
    function getInterpolatedState() {
      if (!replayData) return null
      
      const idxF = currentRealTime / replayData.frame_step
      const i0 = Math.floor(idxF)
      const i1 = Math.min(i0 + 1, replayData.frames.length - 1)
      const frac = idxF - i0
      
      const f0 = replayData.frames[i0]
      const f1 = replayData.frames[i1]
      
      let state = {
        drivers: [],
        sc: null,
        weather: f0.weather || null
      }

      // Interpolate Drivers
      let d1Map = {}
      f1.drivers.forEach(d => d1Map[d.code] = d)
      
      f0.drivers.forEach(d0 => {
        let d1 = d1Map[d0.code] || d0
        state.drivers.push({
          code: d0.code,
          x: d0.x + (d1.x - d0.x)*frac,
          y: d0.y + (d1.y - d0.y)*frac,
          s: d0.s + (d1.s - d0.s)*frac,
          t: d0.t + (d1.t - d0.t)*frac,
          b: d0.b + (d1.b - d0.b)*frac,
          g: frac < 0.5 ? d0.g : d1.g, // round to nearest
          d: d0.d + (d1.d - d0.d)*frac,
          lap: frac < 0.5 ? d0.lap : d1.lap,
          tyre: d1.tyre, // don't interpolate tyre string
          drs: frac < 0.5 ? d0.drs : d1.drs
        })
      })

      // Interpolate Safety Car
      if (f0.sc) {
        if (f1.sc) {
          state.sc = {
            x: f0.sc.x + (f1.sc.x - f0.sc.x)*frac,
            y: f0.sc.y + (f1.sc.y - f0.sc.y)*frac,
            phase: frac < 0.5 ? f0.sc.phase : f1.sc.phase,
            alpha: f0.sc.alpha + (f1.sc.alpha - f0.sc.alpha)*frac
          }
        } else {
          state.sc = f0.sc
        }
      }

      // Exact Track Geometric Sorting
      if (replayData.track_x && replayData.track_x.length > 0) {
        const tx = replayData.track_x; const ty = replayData.track_y; const n = tx.length;
        state.drivers.forEach(d => {
          let minDistSq = Infinity; let bestIdx = 0;
          for (let i=0; i<n; i++) {
            const dx = d.x - tx[i], dy = d.y - ty[i], distSq = dx*dx + dy*dy;
            if (distSq < minDistSq) { minDistSq = distSq; bestIdx = i;}
          }
          d.trackProg = bestIdx / n
        })
      } else {
        state.drivers.forEach(d => d.trackProg = 0)
      }

      // Sort Leaderboard strictly by Lap + TrackProgression
      state.drivers.sort((a,b) => (b.lap + b.trackProg) - (a.lap + a.trackProg))

      // Compute Gaps (Seconds = dist_m / 55.56 approximate)
      if (state.drivers.length > 0) {
        let refL = state.drivers[0]
        let L_prog = refL.lap + refL.trackProg
        for(let i=0; i<state.drivers.length; i++){
          let d = state.drivers[i]
          let prog = d.lap + d.trackProg
          let rawGapToLeader = (L_prog - prog) * (replayData.track_x.length / 10) // approximate meters
          d.gapL = rawGapToLeader / 55.56
          
          if (i === 0) {
            d.gapI = 0
          } else {
            let prev = state.drivers[i-1]
            let p_prog = prev.lap + prev.trackProg
            let rawGapToInt = (p_prog - prog) * (replayData.track_x.length / 10)
            d.gapI = rawGapToInt / 55.56
          }
        }
      }

      return state
    }

    function tick(time) {
      if (!playing) return
      const dt = time - lastTickTime
      lastTickTime = time
      const s_rt = speeds[speedIdx]
      currentRealTime += (dt / 1000) * s_rt
      
      if (currentRealTime >= replayData.t_max) {
        currentRealTime = replayData.t_max
        playing = false
        document.getElementById("btnPlay").textContent = "▶"
      }
      
      drawFrame()
      if (playing && !isScrubbing) reqAnimFrame = requestAnimationFrame(tick)
    }

    function drawFrame() {
      if (!replayData) return
      
      ctx.clearRect(0,0, canvas.width, canvas.height)
      ctx.save()
      ctx.translate(camera.x, camera.y)
      ctx.scale(camera.scale, -camera.scale)
      
      // Draw Track
      if (replayData.track_x) {
        ctx.beginPath()
        for(let i=0; i<replayData.track_x.length; i++) {
          let x = replayData.track_x[i], y = replayData.track_y[i]
          if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.strokeStyle = "rgba(40,40,40,0.8)"
        ctx.lineWidth = 14 / camera.scale
        ctx.lineJoin = 'round'; ctx.lineCap = 'round'
        ctx.stroke()
        
        ctx.strokeStyle = "#ffffff"
        ctx.lineWidth = 1 / camera.scale
        ctx.stroke()
      }

      // Obtain interpolated frame
      const state = getInterpolatedState()
      if (!state) { ctx.restore(); return }

      // Draw Safety Car
      if (state.sc) {
        const sc = state.sc
        ctx.beginPath()
        ctx.arc(sc.x, sc.y, 8/camera.scale, 0, Math.PI*2)
        ctx.fillStyle = `rgba(255, 165, 0, ${sc.alpha})`
        ctx.fill()
        ctx.lineWidth = 2/camera.scale
        ctx.strokeStyle = `rgba(255, 200, 0, ${sc.alpha})`
        ctx.stroke()
        
        ctx.save()
        ctx.scale(1, -1) // Unflip text
        ctx.font = `${10/camera.scale}px Inter`
        ctx.fillStyle = `rgba(255,255,255,${sc.alpha})`
        ctx.fillText(sc.phase === 'deploying' ? "SC DEPLOY" : "SC", sc.x, -sc.y - 12/camera.scale)
        ctx.restore()
      }

      // Draw Drivers
      state.drivers.forEach(d => {
        let col = teamColors[d.code] || '#fff'
        let r = selectedDrivers.includes(d.code) ? 8 : 5
        
        ctx.beginPath()
        ctx.arc(d.x, d.y, r/camera.scale, 0, Math.PI*2)
        ctx.fillStyle = col
        ctx.fill()
        
        if (selectedDrivers.includes(d.code)) {
          ctx.strokeStyle = '#fff'
          ctx.lineWidth = 2/camera.scale
          ctx.stroke()
        }

        ctx.save()
        ctx.scale(1, -1)
        ctx.font = `bold ${10/camera.scale}px Inter`
        ctx.fillStyle = col
        ctx.fillText(d.code, d.x + 8/camera.scale, -d.y)
        ctx.restore()
      })
      
      ctx.restore()

      // Update Weather
      if (state.weather) {
        const w = state.weather
        document.getElementById('wAir').textContent = w.air_temp.toFixed(1) + " °C"
        document.getElementById('wTrk').textContent = w.track_temp.toFixed(1) + " °C"
        document.getElementById('wHum').textContent = w.humidity.toFixed(0) + " %"
        document.getElementById('wWnd').textContent = w.wind_speed.toFixed(1) + " km/h"
        document.getElementById('wRin').textContent = w.rainfall > 0 ? "Yes" : "No"
      }

      // Update Scrubber
      if (!isScrubbing) {
        scrubber.value = (currentRealTime / replayData.t_max) * 1000
      }
      document.getElementById("timeCur").textContent = formatTime(currentRealTime)
      document.getElementById("timeMax").textContent = formatTime(replayData.t_max)

      // Update Leaderboard HTML (Using Flex Order avoiding redraws)
      state.drivers.forEach((d, i) => {
        let row = document.getElementById(`lb-row-${d.code}`)
        if(row) {
          row.style.order = i
          
          let isSel = selectedDrivers.includes(d.code)
          row.className = `lb-row ${isSel?'selected':''}`
          
          document.getElementById(`lb-pos-${d.code}`).textContent = i + 1
          
          // Gap text
          let gapTxt = ""
          if (i === 0) { gapTxt = gapMode==='I' ? "-" : "Leader" }
          else {
            let val = gapMode==='I' ? d.gapI : d.gapL;
            gapTxt = val > 0 ? `+${val.toFixed(1)}s` : ""
          }
          document.getElementById(`lb-gap-${d.code}`).textContent = gapTxt

          // DRS
          document.getElementById(`lb-drs-${d.code}`).className = `lb-drs ${((d.drs>=10 && d.drs<=14) || d.drs===8) ? 'active' : ''}`

          // Tyre
          let tBg = document.getElementById(`lb-tyre-bg-${d.code}`)
          let tFg = document.getElementById(`lb-tyre-fg-${d.code}`)
          tBg.textContent = d.tyre; tFg.textContent = d.tyre;
          tBg.className = `lb-tyre lb-tyre-bg tyre-${d.tyre}`
          tFg.className = `lb-tyre lb-tyre-fg tyre-${d.tyre}`
          
          // Tyre Age (mocking out of 30 laps for scale mask)
          let age = Math.round(d.d / 5000) // approx laps old
          document.getElementById(`lb-age-${d.code}`).textContent = age
          let maskPct = Math.max(0, 100 - (age / 30)*100)
          tFg.style.clipPath = `inset(${100-maskPct}% 0 0 0)`
        }
      })
      if (state.drivers.length > 0) {
        document.getElementById("lbLapCount").textContent = `${Math.max(1, state.drivers[0].lap)} / ${replayData.total_laps}`
      }

      // Update Insights Chart
      if (selectedDrivers.length > 0 && chartInstance.canvas.offsetParent !== null) {
        const code = selectedDrivers[0]
        const d = state.drivers.find(x => x.code === code)
        if (d) {
          // We push real-time data into the labels/datasets like a moving window
          const maxPts = 100
          if (chartInstance.data.labels.length > maxPts) {
             chartInstance.data.labels.shift()
             chartInstance.data.datasets.forEach(ds => ds.data.shift())
          }
          chartInstance.data.labels.push(formatTime(currentRealTime))
          
          if(chartInstance.data.datasets.length === 0) {
            chartInstance.data.datasets = [
              { label:'Speed', data:[], borderColor: teamColors[code]||'#fff', yAxisID: 'y' },
              { label:'Throttle', data:[], borderColor: '#22c55e', yAxisID: 'y1' },
              { label:'Brake', data:[], borderColor: '#e10600', yAxisID: 'y1' }
            ]
          } else {
             chartInstance.data.datasets[0].borderColor = teamColors[code]||'#fff'
          }
          chartInstance.data.datasets[0].data.push(d.s)
          chartInstance.data.datasets[1].data.push(d.t)
          chartInstance.data.datasets[2].data.push(d.b)
          
          chartInstance.update('none')
        }
      } else {
        // flush chart if closed or unselected
        chartInstance.data.labels = []
        chartInstance.data.datasets = []
        chartInstance.update('none')
      }
    }
  </script>
</body>
